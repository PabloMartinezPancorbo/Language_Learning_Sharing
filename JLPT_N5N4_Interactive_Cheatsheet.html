<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultimate JLPT Master</title>
  <style>
    :root {
      --japan-red: #bc002d; --bg-light: #f5f5f0; --text-dark: #2b2b2b;
      --card-bg: #ffffff; --success: #27ae60; --danger: #e74c3c;
    }
    body { font-family: 'Helvetica Neue', 'Meiryo', sans-serif; background-color: var(--bg-light); color: var(--text-dark); margin: 0; padding: 0; }
    .app-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
    .tab-btn { padding: 12px 20px; border: 2px solid var(--japan-red); background: transparent; color: var(--japan-red); border-radius: 8px; cursor: pointer; font-weight: bold; }
    .tab-btn.active { background: var(--japan-red); color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.4s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .study-card { background: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px;}
    table { width: 100%; border-collapse: collapse; margin: 15px 0; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background: #f9f9f9; color: var(--japan-red); }
    .question-box { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid var(--japan-red); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .opt-btn { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; text-align: left; font-size: 1rem;}
    .opt-btn:hover { border-color: var(--japan-red); }
    .opt-btn.selected { background: #ffecec; border-color: var(--japan-red); }
    .opt-btn.correct { background: var(--success); color: white; border-color: var(--success); }
    .opt-btn.wrong { background: var(--danger); color: white; border-color: var(--danger); }
    .submit-exam { display: block; width: 200px; margin: 20px auto; padding: 15px; background: var(--japan-red); color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; }
  </style>
</head>
<body>
      <div class="app-container">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('study')">📚 Verbs & Grammar</button>
      <button class="tab-btn" onclick="switchTab('exams')">📝 Mock Exams</button>
    </div>

    <div id="study" class="tab-content active">
      <div class="study-card" id="verb-content">
        </div>
    </div>

    <div id="exams" class="tab-content">
      <div class="study-card">
        <h2 style="text-align:center;">JLPT Mock Exams</h2>
        <div style="display:flex; justify-content:center; gap:10px; margin-bottom:20px;">
          <button class="tab-btn active" id="btn-n5" onclick="loadExam('N5')">N5 Exam</button>
          <button class="tab-btn" id="btn-n4" onclick="loadExam('N4')">N4 Exam</button>
        </div>
        <div id="exam-container"></div>
        <button class="submit-exam" onclick="gradeExam()">Grade Exam</button>
        <div id="exam-result" style="text-align: center; font-size: 1.2rem; font-weight: bold; margin-top:15px;"></div>
      </div>
    </div>
    </div>

      <script>
    const JLPT_DATA = {
      verbs: [
        { group: "Group 1 (Godan - U verbs)", plain: "書く (kaku)", masu: "書きます", te: "書いて", meaning: "To write" },
        { group: "Group 1 (Godan - U verbs)", plain: "飲む (nomu)", masu: "飲みます", te: "飲んで", meaning: "To drink" },
        { group: "Group 2 (Ichidan - Ru verbs)", plain: "食べる (taberu)", masu: "食べます", te: "食べて", meaning: "To eat" },
        { group: "Group 2 (Ichidan - Ru verbs)", plain: "見る (miru)", masu: "見ます", te: "見て", meaning: "To see" },
        { group: "Group 3 (Irregular)", plain: "する (suru)", masu: "します", te: "して", meaning: "To do" },
        { group: "Group 3 (Irregular)", plain: "来る (kuru)", masu: "来ます", te: "来て", meaning: "To come" }
      ],
      exams: {
        N5: [
          { q: "「新しい」の よみかたは どれですか。", options: ["あたらし", "あたらしい", "ふるい", "ふるいい"], ans: 1 },
          { q: "わたしは 毎朝 コーヒーを ( )。", options: ["食べます", "見ます", "飲みます", "行きます"], ans: 2 },
          { q: "つくえの 上 ( ) 本が あります。", options: ["に", "で", "を", "へ"], ans: 0 },
          { q: "きのう、ともだちと えいがを ( )。", options: ["見ます", "見ました", "見て", "見ません"], ans: 1 }
        ],
        N4: [
          { q: "この 「漢字」 は どう よみますか。", options: ["かんじ", "かんち", "ほんじ", "もじ"], ans: 0 },
          { q: "あした 雨が ( )、ピクニックに 行きません。", options: ["降る", "降ったら", "降っても", "降りて"], ans: 1 },
          { q: "先生は 私に 本を ( )。", options: ["あげました", "くれました", "もらいました", "かしました"], ans: 1 }
        ]
      }
    };

    let currentLevel = 'N5';

    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tabs .tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      event.currentTarget.classList.add('active');
    }

    function loadExam(level) {
      currentLevel = level;
      document.getElementById('btn-n5').classList.remove('active');
      document.getElementById('btn-n4').classList.remove('active');
      document.getElementById(`btn-${level.toLowerCase()}`).classList.add('active');
      
      const container = document.getElementById('exam-container');
      container.innerHTML = '';
      document.getElementById('exam-result').innerText = '';
      
      JLPT_DATA.exams[level].forEach((item, i) => {
        let opts = item.options.map((o, oi) => 
          `<button class="opt-btn" data-q="${i}" data-opt="${oi}" onclick="selectOpt(this, ${i})">${oi + 1}. ${o}</button>`
        ).join('');
        
        container.innerHTML += `
          <div class="question-box" id="qbox-${i}">
            <p style="font-size:1.1rem; font-weight:bold;">問${i+1}: ${item.q}</p>
            <div class="options-container">${opts}</div>
          </div>
        `;
      });
    }

    function selectOpt(btn, qIndex) {
      const container = document.getElementById(`qbox-${qIndex}`);
      container.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    }

    function gradeExam() {
      let score = 0;
      const questions = JLPT_DATA.exams[currentLevel];
      
      questions.forEach((item, i) => {
        const container = document.getElementById(`qbox-${i}`);
        const selectedBtn = container.querySelector('.opt-btn.selected');
        const allBtns = container.querySelectorAll('.opt-btn');
        
        allBtns.forEach((b, optIndex) => {
          b.classList.remove('correct', 'wrong');
          if (optIndex === item.ans) b.classList.add('correct');
          else if (b === selectedBtn) b.classList.add('wrong');
        });
        
        if (selectedBtn && parseInt(selectedBtn.dataset.opt) === item.ans) {
          score++;
        }
      });
      
      const resultDiv = document.getElementById('exam-result');
      const percent = Math.round((score / questions.length) * 100);
      resultDiv.style.color = percent >= 60 ? 'var(--success)' : 'var(--danger)';
      resultDiv.innerText = `Score: ${score} / ${questions.length} (${percent}%)`;
    }

    window.onload = () => {
      loadExam('N5');
      
      let verbHtml = "<h2>The 3 Verb Groups</h2><p>Here are the essential verbs and their conjugations:</p>";
      verbHtml += "<table><tr><th>Group</th><th>Dictionary (Plain)</th><th>Masu (Polite)</th><th>Te-Form</th><th>Meaning</th></tr>";
      JLPT_DATA.verbs.forEach(v => {
        verbHtml += `<tr><td>${v.group}</td><td><strong>${v.plain}</strong></td><td>${v.masu}</td><td>${v.te}</td><td>${v.meaning}</td></tr>`;
      });
      verbHtml += "</table>";
      document.getElementById('verb-content').innerHTML = verbHtml;
    };
  </script>
</body>
</html>
